<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Blox Hub - Official Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        .wallet-card { background: linear-gradient(135deg, var(--secondary), #000); padding: 30px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .balance-amount { font-size: 3rem; font-weight: bold; margin: 10px 0; display: block; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; }
        .box h3 { margin-top: 0; font-size: 1rem; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn-upload { background: #222; border: 1px dashed #555; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: #ccc; }
        .btn-submit { background: #4caf50; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .item { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .price { font-size: 1.8rem; color: #ffca28; font-weight: bold; display: block; margin: 15px 0; }
        .buy-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; font-weight: bold; text-align: center; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="status"></div>
    <div class="header"><h1>Amber Blox Hub</h1></div>

    <div class="wallet-card">
        <span style="font-size: 0.8rem; opacity: 0.7; letter-spacing: 2px;">WALLET BALANCE</span>
        <span class="balance-amount" id="balanceDisplay">0 Ks</span>
    </div>

    <div class="box">
        <h3>💰 ငွေဖြည့်ရန် ပုံစံဖြည့်ပါ</h3>
        <input type="text" id="username" placeholder="Roblox Username...">
        <select id="amount">
            <option value="1000">1,000 Ks</option>
            <option value="3000">3,000 Ks</option>
            <option value="5000">5,000 Ks</option>
            <option value="10000">10,000 Ks</option>
        </select>
        <div class="btn-upload" onclick="document.getElementById('fileInput').click()" id="fileLabel">📷 ပြေစာ (Screenshot) တင်ရန် နှိပ်ပါ</div>
        <input type="file" id="fileInput" hidden accept="image/*">
        <button class="btn-submit" onclick="requestDeposit()" style="margin-top: 15px;">ငွေဖြည့်ရန် တောင်းဆိုမည်</button>
    </div>

    <div class="shop-grid">
        <div class="item">
            <h3>Lv Max + God + Gas</h3>
            <span class="price">3,000 Ks</span>
            <button class="buy-btn" onclick="purchase('Lv Max + God + Gas', 3000)">ဝယ်ယူမည်</button>
        </div>
        <div class="item">
            <h3>Tiger Inventory 100%</h3>
            <span class="price">4,500 Ks</span>
            <button class="buy-btn" onclick="purchase('Tiger Package 1', 4500)">ဝယ်ယူမည်</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG (အကုန်ဖြည့်ပေးထားပြီးသားဖြစ်သည်) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCS7bb_vbbthRgekyLIDhWMUPtVLY63wSo",
            authDomain: "amberbloxfruitshop.firebaseapp.com",
            projectId: "amberbloxfruitshop",
            storageBucket: "amberbloxfruitshop.firebasestorage.app",
            messagingSenderId: "712977986178",
            appId: "1:712977986178:web:d5402cbd3f12ea01e4fa9b",
            databaseURL: "https://amberbloxfruitshop-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. TELEGRAM CONFIG ---
        const BOT_TOKEN = "7953922687:AAHUO_L-mK49PWh9Xy9N9_H9_H9_H9_H";
        const ADMIN_CHAT_ID = "619000000"; 

        let userBalance = 0;
        let savedUser = localStorage.getItem('savedUser') || "";

        if(savedUser) {
            document.getElementById('username').value = savedUser;
            syncBalance(savedUser);
        }

        function syncBalance(user) {
            db.ref('users/' + user.toLowerCase()).on('value', (snapshot) => {
                userBalance = snapshot.val() ? snapshot.val().balance : 0;
                document.getElementById('balanceDisplay').innerText = userBalance.toLocaleString() + " Ks";
            });
        }

        document.getElementById('fileInput').onchange = function() {
            document.getElementById('fileLabel').innerText = "Selected: " + this.files[0].name;
        };

        async function requestDeposit() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const amount = document.getElementById('amount').value;
            const file = document.getElementById('fileInput').files[0];

            if(!user || !file) { notify("⚠️ Username နှင့် ပြေစာ တင်ပေးပါ!", "#ff9800"); return; }

            localStorage.setItem('savedUser', user);
            syncBalance(user);
            notify("⏳ Admin ဆီသို့ ပို့ဆောင်နေပါသည်...", "#2196f3");

            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', `🔔 **ငွေဖြည့်တောင်းဆိုမှု**\n👤 User: ${user}\n💵 Amount: ${amount} Ks`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                notify("✅ ပို့ဆောင်ပြီးပါပြီ။ Admin စစ်ဆေးပြီးနောက် ငွေရောက်လာပါမည်!", "#4caf50");
            } catch (e) { notify("❌ ပို့ဆောင်မှု မအောင်မြင်ပါ။", "#f44336"); }
        }

        function purchase(itemName, price) {
            const user = document.getElementById('username').value.trim().toLowerCase();
            if(!user) { notify("⚠️ Username အရင်ထည့်ပါ!", "#ff9800"); return; }

            if(userBalance >= price) {
                db.ref('users/' + user).update({ balance: userBalance - price });
                const text = `📦 **Order New!**\n👤 User: ${user}\n🎮 Item: ${itemName}\n💰 Paid: ${price} Ks`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat-id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}`);
                notify("✅ ဝယ်ယူမှု အောင်မြင်ပါသည်။ Admin က မကြာခင် ပစ္စည်းပို့ပေးပါမည်!", "#4caf50");
            } else { notify("❌ လက်ကျန်ငွေ မလုံလောက်ပါ။", "#f44336"); }
        }

        function notify(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg; s.style.backgroundColor = color; s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
