<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Blox Hub - Full System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; }
        .hidden { display: none !important; }
        
        /* Containers */
        .box { background: var(--card); padding: 20px; border-radius: 15px; width: 95%; max-width: 450px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input, select { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }

        /* Buttons */
        .btn-primary { background: #4caf50; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-admin-link { background: none; border: 1px solid #444; color: #555; padding: 8px; width: 100%; margin-top: 20px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        /* Wallet Card */
        .wallet-card { background: linear-gradient(135deg, var(--secondary), #000); padding: 25px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .balance-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .balance-amount { font-size: 2.5rem; font-weight: bold; display: block; margin: 5px 0; color: #fff; }

        /* Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #222; color: var(--primary); position: sticky; top: 0; }
        .search-input { border: 2px solid var(--primary) !important; margin-bottom: 15px; font-weight: bold; }
        .update-box { display: flex; gap: 5px; }
        .update-box input { margin-bottom: 0; padding: 5px; width: 65px; height: 35px; }
        .btn-sm { padding: 5px 10px; background: #2196f3; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Floating Support */
        .support-btn { position: fixed; bottom: 20px; right: 20px; background: #0088cc; color: white; padding: 12px 18px; border-radius: 50px; display: flex; align-items: center; gap: 10px; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 1000; font-size: 0.85rem; font-weight: bold; border: 2px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .support-btn:hover { transform: translateY(-3px); }
        .support-btn img { width: 24px; height: 24px; }

        /* Shop Item */
        .item-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px; text-align: center; }
        .item-price { color: #ffca28; font-weight: bold; font-size: 1.3rem; display: block; margin: 10px 0; }

        #status { position: fixed; top: 15px; padding: 15px 25px; border-radius: 10px; display: none; z-index: 2000; width: 85%; max-width: 400px; text-align: center; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="status"></div>

    <a href="https://t.me/Botambershop" target="_blank" class="support-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
        <span>အဆင်မပြေတာရှိပါက ဆက်သွယ်ရန်</span>
    </a>

    <div id="authSection" class="box">
        <h2 style="color:var(--primary); margin:0 0 10px 0; text-align:center;">Amber Blox Hub</h2>
        <p style="font-size:0.75rem; color:#888; text-align:center; margin-bottom:20px;">စနစ်သစ်အရ နာမည်တူယူ၍မရပါ။</p>
        <input type="text" id="authUser" placeholder="Username (အမည်)">
        <input type="password" id="authPass" placeholder="Password (လျှို့ဝှက်ချက်)">
        <button class="btn-primary" onclick="handleAuth()">ဝင်ရောက်မည် / အကောင့်ဖွင့်မည်</button>
        
        <button class="btn-admin-link" onclick="showAdminLogin()">🛡️ Admin Panel Access</button>
    </div>

    <div id="adminAuthSection" class="box hidden">
        <h3 style="color:#ffca28; margin-top:0;">Admin Authentication</h3>
        <input type="password" id="adminPassInput" placeholder="Enter Admin Secret Key">
        <button class="btn-primary" style="background:#ffca28; color:black;" onclick="checkAdmin()">Login as Admin</button>
        <button class="btn-admin-link" onclick="location.reload()">Back to Shop</button>
    </div>

    <div id="adminPanel" class="box hidden" style="max-width: 600px; width:100%;">
        <h3 style="color:#ffca28; margin-top:0;">User Management</h3>
        <input type="text" id="userSearch" class="search-input" placeholder="🔍 Username ဖြင့် ရှာဖွေရန်..." onkeyup="filterUsers()">
        <div style="max-height: 450px; overflow-y: auto; border: 1px solid #333; border-radius: 8px;">
            <table id="userTable">
                <thead><tr><th>User ID</th><th>Balance</th><th>Action</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
        <button class="btn-primary" style="margin-top:20px; background:#f44336;" onclick="location.reload()">Close Dashboard</button>
    </div>

    <div id="mainContent" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="wallet-card">
            <span class="balance-label">Welcome, <span id="displayUserName" style="color:#ffca28;"></span></span>
            <span class="balance-amount" id="balanceDisplay">0 Ks</span>
            <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:#ccc; padding:6px 15px; border-radius:20px; font-size:0.7rem; cursor:pointer; margin-top:5px;">Logout Account</button>
        </div>
        
        <div class="box">
            <h3 style="color:var(--primary); margin-top:0;">💰 ငွေဖြည့်ရန် (Deposit)</h3>
            <div style="background:#0a0a0a; padding:15px; border-radius:10px; font-size:0.85rem; border:1px solid #333; margin-bottom:15px; line-height:1.6;">
                <span style="color:#ffca28;">Kpay/Wave:</span> <b>09671811551</b><br>
                <span style="color:#ffca28;">Name:</span> <b>Bhone Pyae Shan</b>
            </div>
            <select id="method"><option value="Kpay">Kpay</option><option value="Wave Pay">Wave Pay</option></select>
            <select id="amount"><option value="1000">1,000 Ks</option><option value="3000">3,000 Ks</option><option value="5000">5,000 Ks</option></select>
            <input type="file" id="fileInput" hidden accept="image/*">
            <button onclick="document.getElementById('fileInput').click()" style="width:100%; padding:12px; background:#222; border:2px dashed #444; color:#aaa; margin-bottom:12px; border-radius:8px; cursor:pointer;">📷 ပြေစာ Screenshot တင်ရန်</button>
            <button class="btn-primary" style="background:#2196f3;" onclick="requestDeposit()">ငွေဖြည့်တောင်းဆိုမည်</button>
        </div>

        <div style="width:95%; max-width:450px;">
            <h3 style="color:var(--primary); margin-left:5px;">🛒 Available Items</h3>
            <div class="item-card">
                <h3 style="margin:0;">Lv Max + God + Gas</h3>
                <span class="item-price">3,000 Ks</span>
                <button class="btn-primary" style="background:linear-gradient(to right, #00d2ff, #3a7bd5);" onclick="purchase('Lv Max + God + Gas', 3000)">ဝယ်ယူမည်</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCS7bb_vbbthRgekyLIDhWMUPtVLY63wSo",
            authDomain: "amberbloxfruitshop.firebaseapp.com",
            projectId: "amberbloxfruitshop",
            storageBucket: "amberbloxfruitshop.firebasestorage.app",
            messagingSenderId: "712977986178",
            appId: "1:712977986178:web:d5402cbd3f12ea01e4fa9b",
            databaseURL: "https://amberbloxfruitshop-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const BOT_TOKEN = "8678530738:AAGkk72-WHfqcP7UPdd_WNCJKsHnqA_A3kE";
        const ADMIN_CHAT_ID = "6318450352"; 
        const ADMIN_KEY = "200412";

        let currentUser = null;

        window.onload = () => { 
            const savedUser = localStorage.getItem('loggedUser');
            if(savedUser) { currentUser = savedUser; showMain(); } 
        };

        // Duplicate Check + Login/Register
        async function handleAuth() {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) { notify("⚠️ အချက်အလက်ဖြည့်ပါ", "#ff9800"); return; }
            if(user.length < 3) { notify("⚠️ နာမည် အနည်းဆုံး ၃ လုံးရှိရမည်", "#ff9800"); return; }

            const snap = await db.ref('users/' + user).once('value');
            if(snap.val()) {
                // User exists - check password
                if(snap.val().password === pass) { 
                    login(user); 
                } else { 
                    notify("❌ ဒီအမည်ကို တစ်ခြားသူယူထားပြီးဖြစ်သည် (သို့) Password မှားနေသည်", "#f44336"); 
                }
            } else { 
                // Create new user
                await db.ref('users/' + user).set({ password: pass, balance: 0 }); 
                login(user); 
                notify("✅ အကောင့်အသစ် ဖွင့်ပြီးပါပြီ", "#4caf50");
            }
        }

        function login(user) { currentUser = user; localStorage.setItem('loggedUser', user); showMain(); }
        function logout() { localStorage.removeItem('loggedUser'); location.reload(); }

        function showMain() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = currentUser.toUpperCase();
            db.ref('users/' + currentUser).on('value', (s) => { 
                if(s.val()) document.getElementById('balanceDisplay').innerText = s.val().balance.toLocaleString() + " Ks"; 
            });
        }

        // Admin Logics
        function showAdminLogin() { 
            document.getElementById('authSection').classList.add('hidden'); 
            document.getElementById('adminAuthSection').classList.remove('hidden'); 
        }

        function checkAdmin() {
            if(document.getElementById('adminPassInput').value === ADMIN_KEY) {
                document.getElementById('adminAuthSection').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadUsers();
            } else { notify("❌ Admin Key မှားယွင်းပါသည်", "#f44336"); }
        }

        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                let html = '';
                for(let id in users) {
                    html += `<tr><td><b>${id}</b></td><td>${users[id].balance}</td>
                    <td><div class="update-box"><input type="number" id="input-${id}" placeholder="+Ks"><button class="btn-sm" onclick="addBalance('${id}')">Add</button></div></td></tr>`;
                }
                document.getElementById('userTableBody').innerHTML = html;
            });
        }

        function filterUsers() {
            let input = document.getElementById("userSearch").value.toLowerCase();
            let tr = document.getElementById("userTable").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) tr[i].style.display = (td.innerText || td.textContent).toLowerCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        async function addBalance(userId) {
            const amount = parseInt(document.getElementById('input-'+userId).value);
            if(!amount) return;
            const snap = await db.ref('users/'+userId+'/balance').once('value');
            await db.ref('users/'+userId).update({ balance: (snap.val() || 0) + amount });
            notify("✅ " + userId + " ထံ ငွေဖြည့်ပြီး!", "#4caf50");
            document.getElementById('input-'+userId).value = '';
        }

        // User Deposit & Purchase
        async function requestDeposit() {
            const f = document.getElementById('fileInput').files[0];
            if(!f) { notify("⚠️ ပြေစာပုံအရင်တင်ပါ", "#ff9800"); return; }
            notify("⏳ Admin ထံသို့ ပို့နေပါသည်...", "#2196f3");
            const fd = new FormData();
            fd.append('chat_id', ADMIN_CHAT_ID); fd.append('photo', f);
            fd.append('caption', `🔔 **Deposit Alert**\n👤 User: ${currentUser}\n💰 Amount: ${document.getElementById('amount').value} Ks\n💳 Method: ${document.getElementById('method').value}`);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            notify("✅ ပို့ပြီးပါပြီ! Admin စစ်ဆေးပြီးသည်အထိ စောင့်ပါ", "#4caf50");
        }

        async function purchase(name, price) {
            const snap = await db.ref('users/'+currentUser+'/balance').once('value');
            const bal = snap.val() || 0;
            if(bal >= price) {
                if(confirm(name + " ကိုဝယ်ယူမှာ သေချာပါသလား?")) {
                    await db.ref('users/' + currentUser).update({ balance: bal - price });
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent("📦 **New Order**\n👤 User: "+currentUser+"\n🎮 Item: "+name)}`);
                    notify("✅ ဝယ်ယူမှုအောင်မြင်ပါသည်!", "#4caf50");
                }
            } else { notify("❌ လက်ကျန်ငွေ မလုံလောက်ပါ!", "#f44336"); }
        }

        function notify(m, c) { 
            const s = document.getElementById('status'); 
            s.innerText = m; s.style.backgroundColor = c; s.style.color = "white"; 
            s.style.display = 'block'; 
            setTimeout(() => s.style.display='none', 3500); 
        }
    </script>
</body>
</html>
