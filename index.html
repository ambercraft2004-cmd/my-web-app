<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Blox Hub</title>
    <style>
        /* CSS Design - ဒီအပိုင်းပါမှ လှမှာပါ */
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { color: var(--primary); margin: 0; text-transform: uppercase; }
        .wallet-card { background: linear-gradient(135deg, var(--secondary), #000); padding: 20px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-amount { font-size: 2.2rem; font-weight: bold; display: block; margin: 5px 0; }
        .topup-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .item-card { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .price-tag { font-size: 1.5rem; color: #ffca28; font-weight: bold; display: block; margin: 10px 0; }
        select { width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; margin-bottom: 15px; }
        .buy-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px; border-radius: 10px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status"></div>
    <div class="header">
        <h1>Amber Blox Hub</h1>
    </div>
    <div class="wallet-card">
        <span style="font-size: 0.8rem; opacity: 0.8;">BALANCE</span>
        <span class="balance-amount" id="balanceDisplay">0 Ks</span>
        <button class="topup-btn" onclick="requestTopup()">+ Add Credit</button>
    </div>
    <div class="shop-grid">
        <div class="item-card">
            <h3>Lv Max + God + Gas</h3>
            <p style="font-size: 0.8rem; color: #aaa;">100% Inventory | Random: Cdk, SG, MM</p>
            <span class="price-tag">3,000 Ks</span>
            <button class="buy-btn" onclick="autoBuy('Lv Max + God + Gas', 3000)">Purchase Now</button>
        </div>
        <div class="item-card">
            <h3>Tiger Inventory 100%</h3>
            <select id="tiger-select" onchange="updateTigerUI()">
                <option value="4500" data-name="Lv Max + God + Tiger">Package 1: Lv Max + God + Tiger (4500ks)</option>
                <option value="5500" data-name="Tiger + Mythical">Package 2: Tiger + Mythical (5500ks)</option>
                <option value="8000" data-name="Lv Max + God + Cdk + Tiger">Package 3: Cdk + Tiger (8000ks)</option>
            </select>
            <span id="tiger-price-display" class="price-tag">4,500 Ks</span>
            <button class="buy-btn" onclick="buyTigerAuto()">Purchase Now</button>
        </div>
    </div>
    <script>
        let balance = localStorage.getItem('userBalance') ? parseInt(localStorage.getItem('userBalance')) : 0;
        updateUI();
        function updateUI() { document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " Ks"; localStorage.setItem('userBalance', balance); }
        function updateTigerUI() { const price = document.getElementById('tiger-select').value; document.getElementById('tiger-price-display').innerText = parseInt(price).toLocaleString() + " Ks"; }
        function autoBuy(name, price) {
            if (balance >= price) { balance -= price; updateUI(); showStatus("✅ ဝယ်ယူမှု အောင်မြင်ပါသည်!", "#4caf50"); }
            else { showStatus("❌ လက်ကျန်ငွေ မလုံလောက်ပါ!", "#f44336"); }
        }
        function buyTigerAuto() {
            const select = document.getElementById('tiger-select');
            const price = parseInt(select.value);
            const name = select.options[select.selectedIndex].getAttribute('data-name');
            autoBuy(name, price);
        }
        function requestTopup() {
            const amount = prompt("ဘယ်လောက်ဖိုး ငွေဖြည့်မလဲ?");
            if (amount && !isNaN(amount)) { balance += parseInt(amount); updateUI(); showStatus("💰 ငွေဖြည့်သွင်းမှု အောင်မြင်ပါသည်!", "#2196f3"); }
        }
        function showStatus(msg, color) {
            const s = document.getElementById('status'); s.innerText = msg; s.style.backgroundColor = color; s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
