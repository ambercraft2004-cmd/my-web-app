<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber Blox Hub - Official Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; font-size: 1.5rem; }
        
        .auth-container { background: var(--card); padding: 25px; border-radius: 15px; width: 95%; max-width: 400px; border: 1px solid #333; margin-bottom: 20px; }
        .hidden { display: none; }
        
        .wallet-card { background: linear-gradient(135deg, var(--secondary), #000); padding: 30px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .balance-amount { font-size: 2.5rem; font-weight: bold; margin: 10px 0; display: block; }
        
        .box { background: var(--card); padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; }
        .box h3 { margin-top: 0; font-size: 1rem; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .btn-upload { background: #222; border: 1px dashed #555; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: #ccc; }
        .btn-primary { background: #4caf50; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-logout { background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }
        
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .item { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; }
        .price { font-size: 1.5rem; color: #ffca28; font-weight: bold; display: block; margin: 10px 0; }
        .buy-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; font-weight: bold; text-align: center; width: 80%; max-width: 400px; }
        .note { font-size: 0.75rem; color: #aaa; margin-top: -10px; margin-bottom: 15px; display: block; }
        .payment-info { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid #333; color: #00d2ff; text-align: left; }
    </style>
</head>
<body>

    <div id="status"></div>
    <div class="header"><h1>Amber Blox Hub</h1></div>

    <div id="authSection" class="auth-container">
        <h3 style="color:var(--primary); margin-top:0;">Login / Register</h3>
        <p class="note">⚠️ Username နဲ့ Password ကို သေချာမှတ်ထားပါ။</p>
        <input type="text" id="authUser" placeholder="Username">
        <input type="password" id="authPass" placeholder="Password">
        <button class="btn-primary" onclick="handleAuth()">ဝင်ရောက်မည်</button>
    </div>

    <div id="mainContent" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="wallet-card">
            <span style="font-size: 0.8rem; opacity: 0.7; letter-spacing: 2px;">WELCOME, <span id="displayUserName"></span></span>
            <span class="balance-amount" id="balanceDisplay">0 Ks</span>
            <button class="btn-logout" onclick="logout()">Logout ထွက်မည်</button>
        </div>

        <div class="box">
            <h3>💰 ငွေဖြည့်ရန် (Deposit)</h3>
            <div class="payment-info">
                <p style="margin: 5px 0;"><b>KPay/Wave:</b> 09671811551</p>
                <p style="margin: 5px 0;"><b>Name:</b> Bhone Pyae Shan</p>
                <p style="font-size: 0.7rem; color: #ffca28;">(ငွေအရင်လွှဲပြီးမှ ပြေစာတင်ပေးပါ)</p>
            </div>
            <select id="method">
                <option value="Kpay">Kpay ဖြင့်လွှဲထားသည်</option>
                <option value="Wave Pay">Wave Pay ဖြင့်လွှဲထားသည်</option>
            </select>
            <select id="amount">
                <option value="1000">1,000 Ks</option>
                <option value="3000">3,000 Ks</option>
                <option value="5000">5,000 Ks</option>
                <option value="10000">10,000 Ks</option>
            </select>
            <div class="btn-upload" onclick="document.getElementById('fileInput').click()" id="fileLabel">📷 ပြေစာ (Screenshot) တင်ရန် နှိပ်ပါ</div>
            <input type="file" id="fileInput" hidden accept="image/*">
            <button class="btn-primary" onclick="requestDeposit()" style="margin-top: 15px; background: #2196f3;">ငွေဖြည့်ရန် တောင်းဆိုမည်</button>
        </div>

        <div class="shop-grid">
            <div class="item">
                <h3>Lv Max + God + Gas</h3>
                <span class="price">3,000 Ks</span>
                <button class="buy-btn" onclick="purchase('Lv Max + God + Gas', 3000)">ဝယ်ယူမည်</button>
            </div>
            <div class="item">
                <h3>Tiger Inventory 100%</h3>
                <span class="price">4,500 Ks</span>
                <button class="buy-btn" onclick="purchase('Tiger Package 1', 4500)">ဝယ်ယူမည်</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCS7bb_vbbthRgekyLIDhWMUPtVLY63wSo",
            authDomain: "amberbloxfruitshop.firebaseapp.com",
            projectId: "amberbloxfruitshop",
            storageBucket: "amberbloxfruitshop.firebasestorage.app",
            messagingSenderId: "712977986178",
            appId: "1:712977986178:web:d5402cbd3f12ea01e4fa9b",
            databaseURL: "https://amberbloxfruitshop-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Telegram Bot Config
        const BOT_TOKEN = "8678530738:AAGkk72-WHfqcP7UPdd_WNCJKsHnqA_A3kE";
        const ADMIN_CHAT_ID = "6318450352"; 

        let currentUser = null;
        let userBalance = 0;

        // Session Check
        window.onload = () => {
            const saved = localStorage.getItem('loggedUser');
            if(saved) { currentUser = saved; showMain(); }
        };

        // Login & Register Logic
        async function handleAuth() {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) { notify("⚠️ အကုန်ဖြည့်ပါ!", "#ff9800"); return; }
            
            const snap = await db.ref('users/' + user).once('value');
            if(snap.val()) {
                if(snap.val().password === pass) { login(user); } 
                else { notify("❌ Password မှားနေသည်!", "#f44336"); }
            } else { 
                await db.ref('users/' + user).set({ password: pass, balance: 0 }); 
                login(user); 
            }
        }

        function login(user) { currentUser = user; localStorage.setItem('loggedUser', user); showMain(); }
        function logout() { localStorage.removeItem('loggedUser'); location.reload(); }

        function showMain() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = currentUser.toUpperCase();
            
            db.ref('users/' + currentUser).on('value', (s) => {
                if(s.val()) {
                    userBalance = s.val().balance;
                    document.getElementById('balanceDisplay').innerText = userBalance.toLocaleString() + " Ks";
                }
            });
        }

        // Deposit Request
        async function requestDeposit() {
            const m = document.getElementById('method').value;
            const a = document.getElementById('amount').value;
            const f = document.getElementById('fileInput').files[0];
            if(!f) { notify("⚠️ ပြေစာ တင်ပေးပါ!", "#ff9800"); return; }
            
            notify("⏳ ပို့နေပါသည်...", "#2196f3");
            const fd = new FormData();
            fd.append('chat_id', ADMIN_CHAT_ID); 
            fd.append('photo', f);
            fd.append('caption', `🔔 **ငွေဖြည့်တောင်းဆိုမှု**\n👤 User: ${currentUser}\n💰 Amount: ${a} Ks\n💳 Method: ${m}`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                notify("✅ ပို့ပြီးပါပြီ! Admin က မကြာခင် ငွေဖြည့်ပေးပါလိမ့်မည်။", "#4caf50");
            } catch (e) { notify("❌ Error ဖြစ်သွားပါသည်!", "#f44336"); }
        }

        // Purchase Logic
        async function purchase(name, price) {
            if(userBalance >= price) {
                const newBalance = userBalance - price;
                await db.ref('users/' + currentUser).update({ balance: newBalance });
                const text = `📦 **Order New!**\n👤 User: ${currentUser}\n🎮 Item: ${name}\n💰 Paid: ${price} Ks`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}`);
                notify("✅ ဝယ်ယူမှု အောင်မြင်သည်!", "#4caf50");
            } else { notify("❌ လက်ကျန်ငွေ မလုံလောက်ပါ!", "#f44336"); }
        }

        function notify(m, c) {
            const s = document.getElementById('status');
            s.innerText = m; s.style.backgroundColor = c; s.style.display = 'block';
            setTimeout(() => s.style.display='none', 4000);
        }

        document.getElementById('fileInput').onchange = function() {
            if(this.files[0]) document.getElementById('fileLabel').innerText = "ရွေးပြီးပါပြီ: " + this.files[0].name;
        };
    </script>
</body>
</html>
