<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="u-jHRR_pB3DVTr_LFSvwxCbQ7vqaYRb9bv41FzhR5Vc" />
    <title>Amber Blox Hub - Best Blox Fruit Shop Myanmar</title>
    <meta name="description" content="Amber Blox Hub မှာ Blox Fruit accounts များကို ဈေးနှုန်းအသက်သာဆုံးနဲ့ ဝယ်ယူနိုင်ပါသည်။">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0 10px 100px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; width: 95%; max-width: 450px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 8px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .btn-primary { background: #4caf50; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #555 !important; opacity: 0.7; }
        .wallet-card { background: linear-gradient(135deg, var(--secondary), #000); padding: 25px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 600px; margin-top: 15px; }
        .item-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        .item-img { width: 100%; border-radius: 10px; margin-bottom: 8px; aspect-ratio: 1/1; object-fit: cover; }
        .price-tag { color: #ffca28; font-weight: bold; font-size: 0.85rem; margin-bottom: 8px; display: block; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); z-index: 3000; width: 85%; max-width: 380px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2999; }
        #status { position: fixed; top: 10px; padding: 15px; border-radius: 10px; display: none; z-index: 5000; width: 80%; text-align: center; font-weight: bold; }
        .yt-link { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; text-decoration: none; color: #ff0000; font-size: 0.85rem; font-weight: bold; padding: 10px; border: 1px solid #ff000044; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="status"></div>

    <div id="accModal" class="hidden">
        <div class="overlay"></div>
        <div class="modal">
            <h2 style="color:#4caf50;">ဝယ်ယူမှု အောင်မြင်သည်! ✅</h2>
            <div id="accDetails" style="background:#000; padding:15px; border-radius:10px; color:#ffca28; font-family:monospace; margin:15px 0; border:1px dashed #555; word-break: break-all;"></div>
            <button class="btn-primary" onclick="copyAccount()" style="background:#2196f3; margin-bottom:10px;">📋 Copy Account</button>
            <button class="btn-primary" onclick="closeModal()" style="background:#555;">ပိတ်မည်</button>
        </div>
    </div>

    <div id="authSection" class="box" style="margin-top: 30px;">
        <h2 style="color:var(--primary); text-align:center;">Amber Blox Hub</h2>
        <input type="text" id="authUser" placeholder="Username">
        <input type="password" id="authPass" placeholder="Password">
        <button class="btn-primary" onclick="handleAuth()">ဝင်ရောက်မည်</button>
        <a href="https://youtube.com/@ambercraftgaming" target="_blank" class="yt-link">YouTube❤️</a>
        <p style="text-align:center; font-size:0.7rem; margin-top:20px; color:#333; cursor:pointer;" onclick="toggleAdmin()">🛡️ Admin Panel</p>
    </div>

    <div id="adminPanel" class="box hidden">
        <h3>🛡️ Admin Control</h3>
        <input type="password" id="adminKey" placeholder="Admin Password">
        <select id="stockTarget">
            <option value="v4_1">GOD + DRACO V4</option>
            <option value="v4_2">GOD + CDK + DRACO V4</option>
            <option value="v4_3">GOD + CDK + HUMAN V4</option>
        </select>
        <textarea id="stockData" rows="3" placeholder="acc:pass (တစ်ကြောင်းချင်းစီထည့်ရန်)"></textarea>
        <button class="btn-primary" onclick="addStock()">Add Stock</button>
    </div>

    <div id="mainContent" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="wallet-card">
            <span id="displayUserName" style="font-size:0.8rem; color:#ffca28;"></span>
            <span style="font-size: 2.5rem; font-weight: bold; display: block;" id="balanceDisplay">0 Ks</span>
            <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:5px 12px; border-radius:20px; cursor:pointer;">Logout</button>
        </div>

        <div class="box">
            <h3 style="color:var(--primary);">💰 Deposit (ငွေဖြည့်ရန်)</h3>
            <input type="number" id="depositAmount" placeholder="Amount (Ks)">
            <input type="file" id="fileInput" accept="image/*">
            <button id="depositBtn" class="btn-primary" style="background:#2196f3;" onclick="requestDeposit()">ငွေဖြည့်မည်</button>
        </div>

        <h3 style="align-self:flex-start; margin-left:15px; color:var(--primary);">🛒 SHOP ITEMS</h3>
        <div class="shop-grid" id="shopItems"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCS7bb_vbbthRgekyLIDhWMUPtVLY63wSo", authDomain: "amberbloxfruitshop.firebaseapp.com", projectId: "amberbloxfruitshop", databaseURL: "https://amberbloxfruitshop-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const BOT_TOKEN = "8678530738:AAGkk72-WHfqcP7UPdd_WNCJKsHnqA_A3kE";
        const ADMIN_CHAT_ID = "6318450352"; 
        let currentUser = null;

        const items = [
            {id: 'v4_1', name: 'GOD + DRACO V4', price: 19000, img: 'https://i.ibb.co/7dZ3ngNf/image.png'},
            {id: 'v4_2', name: 'GOD + CDK + DRACO V4', price: 25000, img: 'https://i.ibb.co/7dZ3ngNf/image.png'},
            {id: 'v4_3', name: 'GOD + CDK + HUMAN V4', price: 8800, img: 'https://i.ibb.co/N6bVhfW3/image.png'}
        ];

        window.onload = () => {
            renderItems();
            updateStocks();
            if(localStorage.getItem('loggedUser')) { currentUser = localStorage.getItem('loggedUser'); showMain(); }
        };

        function renderItems() {
            document.getElementById('shopItems').innerHTML = items.map(item => `
                <div class="item-card">
                    <img src="${item.img}" class="item-img">
                    <h3 style="font-size:0.75rem; margin:5px 0;">${item.name}</h3>
                    <p style="font-size:0.7rem; color:#aaa;">Stock: <span id="stock-${item.id}" style="color:#4caf50;">0</span></p>
                    <span class="price-tag">${item.price.toLocaleString()} Ks</span>
                    <button class="btn-primary" style="font-size:0.8rem;" onclick="purchase('${item.id}', '${item.name}', ${item.price})">ဝယ်ယူမည်</button>
                </div>
            `).join('');
        }

        async function handleAuth() {
            const user = document.getElementById('authUser').value.trim().toLowerCase();
            const pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) return notify("Username နှင့် Password ဖြည့်ပါ", "#ff9800");
            const snap = await db.ref('users/' + user).once('value');
            if(snap.val()) { if(snap.val().password === pass) login(user); else notify("Password မှားနေပါသည်", "#f44336"); }
            else { await db.ref('users/' + user).set({ password: pass, balance: 0 }); login(user); }
        }

        function login(user) { currentUser = user; localStorage.setItem('loggedUser', user); showMain(); }
        function logout() { localStorage.removeItem('loggedUser'); location.reload(); }

        function showMain() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = "USERNAME: " + currentUser.toUpperCase();
            db.ref('users/' + currentUser).on('value', (s) => { if(s.val()) document.getElementById('balanceDisplay').innerText = (s.val().balance || 0).toLocaleString() + " Ks"; });
        }

        async function requestDeposit() {
            const f = document.getElementById('fileInput').files[0];
            const amount = document.getElementById('depositAmount').value;
            if(!f || !amount) return notify("အချက်အလက်စုံအောင်ဖြည့်ပါ", "#ff9800");
            
            const btn = document.getElementById('depositBtn');
            btn.disabled = true; btn.innerText = "ပို့နေပါသည်...";

            const fd = new FormData(); 
            fd.append('chat_id', ADMIN_CHAT_ID); fd.append('photo', f);
            fd.append('caption', `💰 Deposit Request\nUser: ${currentUser}\nAmount: ${amount} Ks`);
            fd.append('reply_markup', JSON.stringify({
                inline_keyboard: [[{ text: "✅ Confirm (ငွေသွင်းမည်)", callback_data: `confirm_${currentUser}_${amount}` }]]
            }));

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd }); 
                notify("✅ Admin ထံသို့ ပို့ပြီးပါပြီ။", "#4caf50");
            } catch(e) { notify("❌ Error ဖြစ်သွားပါသည်", "#f44336"); }
            btn.disabled = false; btn.innerText = "ငွေဖြည့်မည်";
        }

        async function purchase(itemId, itemName, price) {
            const userSnap = await db.ref('users/'+currentUser).once('value');
            const balance = userSnap.val().balance || 0;
            if(balance < price) return notify("❌ လက်ကျန်ငွေ မလုံလောက်ပါ", "#f44336");
            
            const stockSnap = await db.ref('stocks/' + itemId).once('value');
            const stocks = stockSnap.val();
            if(!stocks || stocks.length === 0) return notify("❌ ပစ္စည်းပြတ်နေပါသည်", "#ff9800");

            if(confirm(`${itemName} ကို ဝယ်ယူမှာလား?`)) {
                const boughtAcc = stocks.shift();
                await db.ref('stocks/' + itemId).set(stocks);
                await db.ref('users/' + currentUser).update({ balance: balance - price });
                document.getElementById('accDetails').innerText = boughtAcc;
                document.getElementById('accModal').classList.remove('hidden');
            }
        }

        function updateStocks() {
            db.ref('stocks').on('value', (snap) => {
                const data = snap.val() || {};
                items.forEach(item => { if(document.getElementById('stock-'+item.id)) document.getElementById('stock-'+item.id).innerText = (data[item.id] || []).length; });
            });
        }

        async function addStock() {
            const key = document.getElementById('adminKey').value;
            if(key !== "200412") return alert("Admin Key မှားနေသည်");
            const target = document.getElementById('stockTarget').value;
            const newData = document.getElementById('stockData').value.trim().split('\n');
            const snap = await db.ref('stocks/'+target).once('value');
            const oldStocks = snap.val() || [];
            await db.ref('stocks/'+target).set([...oldStocks, ...newData]);
            alert("Stock ပေါင်းထည့်ပြီးပါပြီ");
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function notify(m, c) { const s = document.getElementById('status'); s.innerText = m; s.style.backgroundColor = c; s.style.display = 'block'; setTimeout(() => s.style.display='none', 4000); }
        function copyAccount() { navigator.clipboard.writeText(document.getElementById('accDetails').innerText); alert("Copied!"); }
        function closeModal() { document.getElementById('accModal').classList.add('hidden'); }
    </script>
</body>
</html>
